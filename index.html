<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AR Diagnostic Engine</title>
    
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar-js@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #111;
            font-family: sans-serif;
        }

        #error-log {
            position: fixed;
            bottom: 10px;
            left: 10px;
            width: calc(100% - 40px);
            max-height: 150px;
            background: rgba(0, 0, 0, 0.85);
            color: #ff4d4d;
            padding: 10px;
            font-family: monospace;
            font-size: 11px;
            border-radius: 8px;
            overflow-y: auto;
            z-index: 9999;
            border: 1px solid #ff3333;
            pointer-events: none;
        }

        #splash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #FDFBF7;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 999;
        }

        .btn {
            background: #4A3728;
            color: white;
            border: none;
            padding: 16px 36px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        /* 16:9 Screen Constraint Container */
        .ar-viewport {
            position: relative;
            width: 100vw;
            height: 56.25vw; 
            max-height: 100vh;
            max-width: 177.78vh;
            margin: auto;
            top: 50%;
            transform: translateY(-50%);
        }
    </style>
</head>
<body>

    <div id="error-log">System Log: Ready. Waiting for user interaction...</div>

    <div id="splash">
        <h2 style="color: #4A3728; margin-bottom: 20px;">AR Initialization</h2>
        <button class="btn" id="startBtn">Launch Camera</button>
    </div>

    <div class="ar-viewport">
        <a-scene 
            id="scene"
            mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiScanning: no;" 
            embedded
            color-space="sRGB" 
            renderer="colorManagement: true, physicallyCorrectLights" 
            vr-mode-ui="enabled: false"
            device-orientation-permission-ui="enabled: true">
            
            <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

            <a-entity mindar-image-target="targetIndex: 0">
                <a-box position="0 0 0" scale="0.4 0.4 0.4" material="color: #FFB74D; opacity: 0.9;"></a-box>
            </a-entity>
        </a-scene>
    </div>

    <script>
        // Inline Mobile Error Catching Pipeline
        const logBox = document.getElementById('error-log');
        function debugLog(msg, isError = false) {
            logBox.innerHTML += `<br><span style="color:${isError ? '#ff4d4d':'#4af34a'}">${msg}</span>`;
            logBox.scrollTop = logBox.scrollHeight;
        }

        window.onerror = function(message, source, lineno, colno, error) {
            debugLog(`ERR: ${message} (Line ${lineno})`, true);
            return false;
        };

        document.getElementById('startBtn').addEventListener('click', async () => {
            document.getElementById('splash').style.display = 'none';
            debugLog("Button clicked. Testing device camera hardware access...");

            // Native hardware verification pass
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                debugLog("Native hardware success! Relinquishing stream to MindAR core...");
                
                // Stop temporary track so MindAR engine can bind natively to it
                stream.getTracks().forEach(track => track.stop());

                const sceneEl = document.getElementById('scene');
                const arSystem = sceneEl.systems["mindar-image-system"];
                
                debugLog("Booting MindAR System...");
                arSystem.start();
                debugLog("AR System active. Point camera at bear picture.");

            } catch (err) {
                debugLog(`CRITICAL STOP: ${err.name} - ${err.message}`, true);
                if(err.name === "NotAllowedError") {
                    debugLog("REMEDY: System permissions permanently blocked. You must manually clear browser cookies or site cache to reset browser prompts.", true);
                }
            }
        });
    </script>
</body>
</html>
