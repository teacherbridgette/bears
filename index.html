<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR Bear Activity</title>
    
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar-js@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Fredoka', 'Comic Sans MS', sans-serif;
        }

        .game-container {
            position: relative;
            width: 100vw;
            height: 56.25vw;
            max-height: 100vh;
            max-width: 177.78vh;
            margin: auto;
            top: 50%;
            transform: translateY(-50%);
            overflow: hidden;
        }

        /* Splash Screen Button to trigger camera permissions */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #FDFBF7;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 999;
        }

        .start-btn {
            background-color: #4A3728;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 22px;
            font-family: 'Fredoka', sans-serif;
            font-weight: 600;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 6px 0 #2A1F17;
            transition: all 0.1s ease;
        }

        .start-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #2A1F17;
        }

        .ui-overlay {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            background: rgba(255, 255, 255, 0.9);
            padding: 12px 24px;
            border-radius: 15px;
            border: 3px solid #4A3728;
            text-align: center;
            pointer-events: none;
            display: none; /* Hidden until game starts */
        }

        #scanning-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.4);
            display: none; /* Hidden until game starts */
            justify-content: center;
            align-items: center;
            z-index: 5;
        }

        .scan-box {
            width: 60%;
            height: 70%;
            border: 4px dashed #FFF;
            border-radius: 20px;
        }

        .mindar-ui-scanning { display: none !important; }
    </style>
</head>
<body>

    <!-- Splash Screen to force browser permission -->
    <div id="splash-screen">
        <h1 style="color: #4A3728; margin-bottom: 30px;">Bear AR Game</h1>
        <button class="start-btn" id="start-button">Start Camera</button>
    </div>

    <div class="game-container">
        <div class="ui-overlay" id="instruction-card">
            <h1 style="margin:0; font-size:24px; color:#4A3728;">Look for the Bear!</h1>
        </div>

        <div id="scanning-overlay"><div class="scan-box"></div></div>

        <!-- Note: autoStart is set to false here -->
        <a-scene 
            id="ar-scene"
            mindar-image="imageTargetSrc: ./targets.mind; uiScanning: #scanning-overlay; autoStart: false;" 
            color-space="sRGB" 
            renderer="colorManagement: true, physicallyCorrectLights" 
            vr-mode-ui="enabled: false" 
            device-orientation-permission-ui="enabled: false"
            embedded>
            
            <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
            <a-entity mindar-image-target="targetIndex: 0" id="bear-target">
                <a-box position="0 0 0" scale="0.5 0.5 0.5" material="color: #FFB74D; opacity: 0.8; transparent: true;"></a-box>
            </a-entity>
        </a-scene>
    </div>

    <script>
        const startButton = document.getElementById('start-button');
        const splashScreen = document.getElementById('splash-screen');
        const sceneEl = document.getElementById('ar-scene');
        const instructionCard = document.getElementById('instruction-card');
        const scanOverlay = document.getElementById('scanning-overlay');

        startButton.addEventListener('click', () => {
            // Hide splash screen
            splashScreen.style.display = 'none';
            instructionCard.style.display = 'block';
            scanOverlay.style.display = 'flex';
            
            // Manually boot up the AR engine via the user click event
            const arSystem = sceneEl.systems["mindar-image-system"];
            arSystem.start(); 
        });

        const targetEl = document.querySelector('#bear-target');
        targetEl.addEventListener("targetFound", () => scanOverlay.style.display = 'none');
        targetEl.addEventListener("targetLost", () => scanOverlay.style.display = 'flex');
    </script>
</body>
</html>
